name: Daily Crawl

on:
  schedule:
    # 매일 한국시간 오후 7시 = UTC 10:00
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: self-hosted
    timeout-minutes: 120

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Linux 의존 패키지 설치 (Playwright)
        if: runner.os == 'Linux'
        run: playwright install-deps chromium

      - name: credentials.json 생성 (Secret → 파일)
        shell: pwsh
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          Set-Content -Path credentials.json -Value $env:GOOGLE_CREDENTIALS -Encoding UTF8

      - name: 네이버 MZ아울렛 크롤링
        run: python naver_crawler_gsheet.py

      - name: 하프클럽 크롤링
        run: python halfclub_crawler_gsheet.py

      - name: 카카오 세이브프라자 크롤링
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python kakao_crawler_gsheet.py

      - name: 디버그 스크린샷 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: |
            *.png
            *.html
          retention-days: 7
