name: Weekly Crawl

on:
  schedule:
    # 매일 한국시간 오후 7시 = UTC 10:00
    - cron: '0 10 * * *'
  workflow_dispatch:  # 수동 실행 버튼도 활성화

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 최대 2시간 (대량 수집 대비)

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: credentials.json 생성 (Secret → 파일)
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: 네이버 MZ아울렛 크롤링
        run: python naver_crawler_gsheet.py

      - name: 하프클럽 크롤링
        run: python halfclub_crawler_gsheet.py

      - name: 카카오 세이브프라자 크롤링
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python kakao_crawler_gsheet.py
